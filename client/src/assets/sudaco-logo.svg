<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="SudACO Sudoku logo">
  <defs>
    <linearGradient id="sudacoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="sudacoCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="40" height="40" rx="12" fill="url(#sudacoBg)" />

  <!-- Mini Sudoku board -->
  <g transform="translate(8 8)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="rgba(15,23,42,0.2)" stroke="rgba(255,255,255,0.62)" stroke-width="1.2" />

    <!-- Highlighted cells -->
    <rect x="0.8" y="0.8" width="7.2" height="7.2" rx="1.4" fill="url(#sudacoCell)" />
    <rect x="8.8" y="8.8" width="7.2" height="7.2" rx="1.4" fill="url(#sudacoCell)" />
    <rect x="16.8" y="16.8" width="6.4" height="6.4" rx="1.4" fill="url(#sudacoCell)" />

    <!-- 3x3 grid lines -->
    <line x1="8" y1="0.6" x2="8" y2="23.4" stroke="rgba(255,255,255,0.72)" stroke-width="1" />
    <line x1="16" y1="0.6" x2="16" y2="23.4" stroke="rgba(255,255,255,0.72)" stroke-width="1" />
    <line x1="0.6" y1="8" x2="23.4" y2="8" stroke="rgba(255,255,255,0.72)" stroke-width="1" />
    <line x1="0.6" y1="16" x2="23.4" y2="16" stroke="rgba(255,255,255,0.72)" stroke-width="1" />

    <!-- Numeric cues -->
    <text x="4" y="6.1" font-family="Outfit, Inter, Arial, sans-serif" font-size="5.2" font-weight="700" fill="white" text-anchor="middle">9</text>
    <text x="12" y="14.1" font-family="Outfit, Inter, Arial, sans-serif" font-size="5.2" font-weight="700" fill="white" text-anchor="middle">4</text>
    <text x="20" y="22.1" font-family="Outfit, Inter, Arial, sans-serif" font-size="5.2" font-weight="700" fill="white" text-anchor="middle">7</text>
  </g>
</svg>
